services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rokhas-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: rokhas-backend
    env_file:
      - ./backend/.env
    environment:
      AGENT_URL: http://agent:8001
      AGENT_API_URL: http://agent:8001/chat
      DATABASE_URL: sqlite:///./rokhas.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      - agent

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile.dev
    container_name: rokhas-agent
    env_file:
      - ./agent/.env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8001:8001"
    volumes:
      - ./agent:/app/agent

volumes:
  frontend_node_modules:
  frontend_next:
